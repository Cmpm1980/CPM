<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Opcoes de logotipo - CPM</title>
<style>
  body { font-family: Arial, sans-serif; background: #eee; padding: 24px; }
  .grelha { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 24px; max-width: 1000px; margin: 0 auto; }
  .cartao { background: #fff; border-radius: 10px; padding: 16px; text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,0.15); }
  .cartao img { width: 160px; height: auto; }
  .cartao p { font-weight: 600; margin-top: 8px; }
</style>
</head>
<body>
  <h1>Opcoes de logotipo - CPM</h1>
  <div class="grelha">
    <div class="cartao"><img src="logo-opcao-1-emblema.svg"><p>1. Emblema circular</p></div>
    <div class="cartao"><img src="logo-opcao-2-escudo-camiao.svg"><p>2. Escudo com camiao</p></div>
    <div class="cartao"><img src="logo-opcao-3-bomba-combustivel.svg"><p>3. Bomba de combustivel</p></div>
    <div class="cartao"><img src="logo-opcao-4-minimalista.svg"><p>4. Minimalista (gota + wordmark)</p></div>
  </div>
</body>
</html>
